<script>
    // ==================== Supabase 配置 ====================
    const SUPABASE_URL = "https://tcewihcxuvriiigcorqq.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_sHnD5f9BkyWm5IwIYI1zfg_ukjmh_Y4";
    const BUCKET_NAME = "music";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentPath = "";
    let selectedFile = null;
    let selectedFilePaths = new Set(); // 存储选中的文件完整路径

    // 上传任务管理
    let uploadTasks = new Map(); // key: 任务id, value: { xhr, fileName, status, progress }
    let nextTaskId = 1;
    const MAX_CONCURRENT = 3;
    let activeUploads = 0;
    let pendingUploadQueue = []; // 待上传文件列表 { file, remotePath }

    // DOM 元素
    const uploadInput = document.getElementById('uploadInput');
    const createFolderBtn = document.getElementById('createFolderBtn');
    const createFolderBtnSidebar = document.getElementById('createFolderBtnSidebar');
    const refreshBtn = document.getElementById('refreshBtn');

    const fileToolbar = document.getElementById('fileToolbar');

    const transferContent = document.getElementById('transferContent');

    let currentContextTarget = null; // 右键点击的目标 { type: 'file'|'folder', name, path }

    // ==================== 辅助函数 ====================
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = `toast ${isError ? 'error' : ''}`;
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function formatBytes(bytes) {
        if (!bytes || bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function formatDate(isoString) {
        if (!isoString) return '-';
        return new Date(isoString).toLocaleString();
    }

    function getPreviewHtml(fileName, publicUrl) {
        const encodedUrl = encodeURI(publicUrl);
        const ext = fileName.split('.').pop().toLowerCase();
        if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) {
            return `<img src="${encodedUrl}" alt="preview" style="max-width:100%; max-height:100%; object-fit:contain;" onerror="this.onerror=null;this.src='';this.alt='加载失败';">`;
        } else if (['mp4','webm','mov'].includes(ext)) {
            return `<video controls style="max-width:100%; max-height:100%;"><source src="${encodedUrl}" type="video/${ext}">无法播放</video>`;
        } else if (['mp3','wav','ogg','flac'].includes(ext)) {
            return `<audio controls style="width:90%;"><source src="${encodedUrl}" type="audio/${ext}">无法播放</audio>`;
        } else {
            return `<div style="font-size: 3rem;">📄</div>`;
        }
    }

    // 更新传输中心显示
    function updateTransferUI() {
        if (uploadTasks.size === 0 && pendingUploadQueue.length === 0) {
            transferContent.innerHTML = '<div class="empty-state">暂无传输任务</div>';
            return;
        }
        let html = '';
        for (const [id, task] of uploadTasks.entries()) {
            html += `
                <div class="transfer-item" data-task-id="${id}">
                    <div class="transfer-name">📤 ${task.fileName}</div>
                    <div class="transfer-progress"><div class="transfer-progress-bar" style="width: ${task.progress}%"></div></div>
                    <div class="transfer-status">${task.status} (${task.progress}%) <span class="transfer-cancel" data-task-id="${id}">取消</span></div>
                </div>
            `;
        }
        for (let i = 0; i < pendingUploadQueue.length; i++) {
            const p = pendingUploadQueue[i];
            html += `
                <div class="transfer-item">
                    <div class="transfer-name">⏳ ${p.file.name}</div>
                    <div class="transfer-status">等待上传</div>
                </div>
            `;
        }
        transferContent.innerHTML = html;
        // 绑定取消事件
        document.querySelectorAll('.transfer-cancel').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const taskId = parseInt(btn.dataset.taskId);
                cancelUpload(taskId);
            });
        });
    }

    // 取消上传
    function cancelUpload(taskId) {
        const task = uploadTasks.get(taskId);
        if (task && task.xhr) {
            task.xhr.abort();
            task.status = '已取消';
            uploadTasks.delete(taskId);
            activeUploads--;
            showToast(`已取消上传: ${task.fileName}`);
            processQueue();
            updateTransferUI();
        }
    }

    // 实际执行上传（使用 XHR 带进度）
    async function performUpload(file, remotePath, taskId) {
        const formData = new FormData();
        formData.append('file', file);
        const url = `${SUPABASE_URL}/storage/v1/object/${BUCKET_NAME}/${remotePath}`;
        const xhr = new XMLHttpRequest();
        const task = uploadTasks.get(taskId);
        if (task) task.xhr = xhr;

        return new Promise((resolve, reject) => {
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    const taskItem = uploadTasks.get(taskId);
                    if (taskItem) {
                        taskItem.progress = percent;
                        taskItem.status = '上传中';
                        updateTransferUI();
                    }
                }
            });
            xhr.onload = () => {
                if (xhr.status === 200) {
                    const taskItem = uploadTasks.get(taskId);
                    if (taskItem) {
                        taskItem.status = '完成';
                        taskItem.progress = 100;
                        updateTransferUI();
                        setTimeout(() => {
                            uploadTasks.delete(taskId);
                            updateTransferUI();
                        }, 1000);
                    }
                    resolve();
                } else {
                    reject(new Error(`上传失败: ${xhr.status}`));
                }
                activeUploads--;
                processQueue();
            };
            xhr.onerror = () => {
                reject(new Error('网络错误'));
                activeUploads--;
                processQueue();
            };
            xhr.onabort = () => {
                reject(new Error('已取消'));
                activeUploads--;
                processQueue();
            };
            xhr.open('POST', url);
            xhr.setRequestHeader('Authorization', `Bearer ${SUPABASE_ANON_KEY}`);
            xhr.setRequestHeader('apikey', SUPABASE_ANON_KEY);
            xhr.send(formData);
        });
    }

    // 添加上传任务
    async function addUpload(file, remotePath) {
        const taskId = nextTaskId++;
        uploadTasks.set(taskId, { fileName: file.name, progress: 0, status: '等待中', xhr: null });
        updateTransferUI();
        pendingUploadQueue.push({ file, remotePath, taskId });
        processQueue();
    }

    // 处理队列
    function processQueue() {
    while (activeUploads < MAX_CONCURRENT && pendingUploadQueue.length > 0) {
        const item = pendingUploadQueue.shift();
        activeUploads++;
        const task = uploadTasks.get(item.taskId);
        if (task) task.status = '上传中';
        updateTransferUI();
        performUpload(item.file, item.remotePath, item.taskId)
            .catch(err => {
                showToast(`${item.file.name} 上传失败: ${err.message}`, true);
                uploadTasks.delete(item.taskId);
                updateTransferUI();
            })
            .finally(() => {
                activeUploads--;
                // 继续处理队列中的其他任务
                processQueue();
                // 所有任务完成后刷新文件列表
                if (activeUploads === 0 && pendingUploadQueue.length === 0) {
                    loadCurrentDirectory();
                }
            });
    }
}

    // 上传入口（多文件）
    // 辅助函数：获取唯一的文件名（避免覆盖）
async function getUniqueFileName(targetPath, fileName) {
    // 构建完整路径（当前目录 + 文件名）
    let fullPath = targetPath ? `${targetPath}${fileName}` : fileName;
    // 检查文件是否存在
    const { data, error } = await supabaseClient.storage
        .from(BUCKET_NAME)
        .list(targetPath, { limit: 1000 });
    if (error) {
        console.error('检查文件是否存在失败:', error);
        return fileName; // 出错时返回原文件名
    }
    const existingNames = (data || []).map(item => item.name);
    if (!existingNames.includes(fileName)) {
        return fileName; // 无冲突，直接返回
    }
    // 有冲突，生成新名称
    let newName = fileName;
    let counter = 1;
    const nameWithoutExt = fileName.replace(/\.[^/.]+$/, '');
    const ext = fileName.includes('.') ? '.' + fileName.split('.').pop() : '';
    while (existingNames.includes(newName)) {
        newName = `${nameWithoutExt} (${counter})${ext}`;
        counter++;
    }
    return newName;
}

// 修改后的上传函数
async function uploadFiles(fileList) {
    const files = Array.from(fileList);
    if (files.length === 0) return;
    for (const file of files) {
        // 获取当前目录前缀
        const prefix = currentPath ? (currentPath.endsWith('/') ? currentPath : currentPath + '/') : '';
        // 获取唯一文件名（避免重名）
        const uniqueName = await getUniqueFileName(prefix, file.name);
        const remotePath = prefix + uniqueName;

        // 添加到传输队列
        const taskId = nextTaskId++;
        uploadTasks.set(taskId, { fileName: file.name, progress: 0, status: '等待中', xhr: null });
        updateTransferUI();
        pendingUploadQueue.push({ file, remotePath, taskId });
        processQueue();
    }
    uploadInput.value = '';
}

    // 递归获取文件夹下所有文件路径
    async function getAllFilesInFolder(folderPath) {
        const path = folderPath.endsWith('/') ? folderPath : folderPath + '/';
        const files = [];
        try {
            const { data, error } = await supabaseClient.storage.from(BUCKET_NAME).list(path, { limit: 1000 });
            if (error) throw error;
            for (const item of data) {
                const fullPath = path + item.name;
                if (item.name.endsWith('/')) {
                    const subFiles = await getAllFilesInFolder(fullPath);
                    files.push(...subFiles);
                } else {
                    files.push(fullPath);
                }
            }
        } catch (err) {
            console.error(err);
        }
        return files;
    }

    // 打包下载文件夹（递归）
    async function downloadFolderAsZip(folderPath) {
        const files = await getAllFilesInFolder(folderPath);
        if (files.length === 0) {
            showToast('文件夹为空，无法打包', true);
            return;
        }
        const zip = new JSZip();
        const folderName = folderPath.replace(/\/$/, '').split('/').pop();
        for (const filePath of files) {
            const publicUrl = supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(filePath).data.publicUrl;
            const response = await fetch(publicUrl);
            const blob = await response.blob();
            // 保留相对路径
            const relativePath = filePath.replace(folderPath, '');
            zip.file(relativePath, blob);
        }
        const content = await zip.generateAsync({ type: 'blob' });
        const url = URL.createObjectURL(content);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${folderName}.zip`;
        a.click();
        URL.revokeObjectURL(url);
        showToast(`✅ 文件夹 ${folderName} 已打包下载`);
    }

    // 批量下载选中文件为 ZIP
    async function batchDownloadSelected() {
        const paths = Array.from(selectedFilePaths);
        if (paths.length === 0) {
            showToast('请先选中文件', true);
            return;
        }
        const zip = new JSZip();
        for (const filePath of paths) {
            const publicUrl = supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(filePath).data.publicUrl;
            const response = await fetch(publicUrl);
            const blob = await response.blob();
            const fileName = filePath.split('/').pop();
            zip.file(fileName, blob);
        }
        const content = await zip.generateAsync({ type: 'blob' });
        const url = URL.createObjectURL(content);
        const a = document.createElement('a');
        a.href = url;
        a.download = `selected_files.zip`;
        a.click();
        URL.revokeObjectURL(url);
        showToast(`✅ 已打包 ${paths.length} 个文件`);
    }

    // ==================== 文件/文件夹管理 ====================
    // 递归删除文件夹
    async function deleteFolderRecursive(folderPath) {
        const path = folderPath.endsWith('/') ? folderPath : folderPath + '/';
        try {
            const { data, error } = await supabaseClient.storage.from(BUCKET_NAME).list(path, { limit: 1000 });
            if (error) throw error;
            for (const item of data) {
                const fullPath = path + item.name;
                if (item.name.endsWith('/')) {
                    await deleteFolderRecursive(fullPath);
                } else {
                    await supabaseClient.storage.from(BUCKET_NAME).remove([fullPath]);
                }
            }
            await supabaseClient.storage.from(BUCKET_NAME).remove([path]);
        } catch (err) {
            console.error(err);
            throw err;
        }
    }

    async function deleteFile(filename) {
        try {
            const { error } = await supabaseClient.storage.from(BUCKET_NAME).remove([filename]);
            if (error) throw error;
            showToast(`✅ 已删除 ${filename}`);
            if (selectedFilePaths.has(filename)) selectedFilePaths.delete(filename);
            loadCurrentDirectory();
        } catch (err) {
            showToast(`删除失败: ${err.message}`, true);
        }
    }

    async function deleteSelectedFiles() {
        const paths = Array.from(selectedFilePaths);
        if (paths.length === 0) return;
        if (confirm(`确定要删除选中的 ${paths.length} 个文件吗？`)) {
            let success = 0, fail = 0;
            for (const path of paths) {
                try {
                    await supabaseClient.storage.from(BUCKET_NAME).remove([path]);
                    success++;
                } catch (err) {
                    fail++;
                }
            }
            showToast(`删除完成: 成功 ${success} 个，失败 ${fail} 个`);
            selectedFilePaths.clear();
            loadCurrentDirectory();
        }
    }

    // ==================== 加载目录 ====================
    async function loadCurrentDirectory() {
        fileGridDiv.innerHTML = '<div class="empty-state">⏳ 加载中...</div>';
        folderListDiv.innerHTML = '<div class="empty-state">⏳ 加载中...</div>';
        selectedFilePaths.clear();
        updateSelectAllCheckbox();
        fileToolbar.style.display = 'none';
        try {
            const { data, error } = await supabaseClient.storage
                .from(BUCKET_NAME)
                .list(currentPath, { limit: 1000 });
            if (error) throw error;

            const validItems = (data || []).filter(item => item.name && item.name !== '.emptyFolderPlaceholder');

            // 提取文件夹（直接子文件夹）
            const folders = new Set();
            validItems.forEach(item => {
                const name = item.name;
                if (name.endsWith('/')) {
                    let folderName = name;
                    if (currentPath && folderName.startsWith(currentPath)) folderName = folderName.substring(currentPath.length);
                    folderName = folderName.replace(/\/+$/, '');
                    if (folderName && !folderName.includes('/')) folders.add(folderName);
                } else if (!item.metadata || item.metadata.size === 0) {
                    if (!name.includes('/')) folders.add(name);
                }
            });
            renderFolderList(Array.from(folders).sort());

            // 文件列表
            const files = validItems.filter(item => {
                if (item.name.endsWith('/')) return false;
                if (!item.metadata || item.metadata.size === 0) return false;
                return true;
            });
            renderFileGrid(files);
            renderBreadcrumb();
        } catch (err) {
            console.error(err);
            fileGridDiv.innerHTML = `<div class="empty-state" style="color:#dc3545">❌ 加载失败: ${err.message}</div>`;
            folderListDiv.innerHTML = '<div class="empty-state">加载失败</div>';
            showToast(`加载失败: ${err.message}`, true);
        }
    }

    function renderFolderList(folders) {
        if (folders.length === 0) {
            folderListDiv.innerHTML = '<div class="empty-state">📭 无子文件夹</div>';
            return;
        }
        folderListDiv.innerHTML = '';
        folders.forEach(folder => {
            const div = document.createElement('div');
            div.className = 'folder-item';
            div.innerHTML = `
                <div class="folder-name">
                    <span>📁 ${folder}</span>
                </div>
                <button class="folder-delete" data-folder="${folder}">🗑️</button>
            `;
            div.querySelector('.folder-name').onclick = () => {
                currentPath = currentPath ? `${currentPath}${folder}/` : `${folder}/`;
                loadCurrentDirectory();
                selectedFile = null;
                updateDetailPanel(null);
            };
            div.querySelector('.folder-delete').onclick = async (e) => {
                e.stopPropagation();
                if (confirm(`确定要删除文件夹 "${folder}" 及其所有内容吗？`)) {
                    const folderFullPath = currentPath ? `${currentPath}${folder}/` : `${folder}/`;
                    try {
                        await deleteFolderRecursive(folderFullPath);
                        showToast(`✅ 文件夹 "${folder}" 已删除`);
                        loadCurrentDirectory();
                    } catch (err) {
                        showToast(`删除失败: ${err.message}`, true);
                    }
                }
            };
            // 右键菜单绑定
            div.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                currentContextTarget = { type: 'folder', name: folder, path: currentPath ? `${currentPath}${folder}/` : `${folder}/` };
                showContextMenu(e.clientX, e.clientY);
            });
            folderListDiv.appendChild(div);
        });
    }

function renderFileGrid(files) {
    if (files.length === 0) {
        fileGridDiv.innerHTML = '<div class="empty-state">📭 暂无文件，点击上方按钮上传</div>';
        fileToolbar.style.display = 'none';
        return;
    }

    fileGridDiv.innerHTML = '';
    files.forEach(file => {
        const fullStoragePath = currentPath ? currentPath + file.name : file.name;
        const publicUrl = supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(fullStoragePath).data.publicUrl;
        const fileSize = file.metadata?.size ? formatBytes(file.metadata.size) : '-';
        const fileDate = file.created_at ? formatDate(file.created_at) : '-';
        const isSelected = selectedFilePaths.has(fullStoragePath);

        const card = document.createElement('div');
        card.className = 'file-card';
        if (selectedFile && selectedFile.name === file.name) card.classList.add('selected');
        card.innerHTML = `
            <input type="checkbox" class="file-checkbox" data-path="${fullStoragePath}" ${isSelected ? 'checked' : ''}>
            <div class="file-preview">
                ${getPreviewHtml(file.name, publicUrl)}
            </div>
            <div class="file-info">
                <div class="file-name" title="${file.name}">${file.name}</div>
                <div class="file-meta">
                    <span>${fileSize}</span>
                    <span>${fileDate}</span>
                </div>
                <div class="file-actions">
                    <a href="${publicUrl}" target="_blank" class="btn-small" download>⬇️ 下载（Powerd by Xlead&李明杰）</a>
                    <button class="btn-small delete-btn" data-filename="${fullStoragePath}">🗑️ 删除</button>
                </div>
            </div>
        `;
        card.onclick = (e) => {
            if (e.target.type === 'checkbox' || e.target.closest('.file-actions')) return;
            selectedFile = file;
            updateDetailPanel(file, fullStoragePath);
            document.querySelectorAll('.file-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
        };
        const checkbox = card.querySelector('.file-checkbox');
        checkbox.addEventListener('change', (e) => {
            e.stopPropagation();
            if (checkbox.checked) selectedFilePaths.add(fullStoragePath);
            else selectedFilePaths.delete(fullStoragePath);
            updateSelectAllCheckbox();
            fileToolbar.style.display = selectedFilePaths.size > 0 ? 'flex' : 'none';
        });
        card.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            currentContextTarget = { type: 'file', name: file.name, path: fullStoragePath };
            showContextMenu(e.clientX, e.clientY);
        });
        fileGridDiv.appendChild(card);
    });

    // 删除按钮事件
    fileGridDiv.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const filename = btn.getAttribute('data-filename');
            if (confirm(`确定要删除 "${filename}" 吗？`)) await deleteFile(filename);
        });
    });

    // 音频全局管理：一次只能播放一个
    const audioElements = fileGridDiv.querySelectorAll('audio');
    function pauseAllOtherAudios(currentAudio) {
        audioElements.forEach(audio => {
            if (audio !== currentAudio && !audio.paused) {
                audio.pause();
            }
        });
    }
    audioElements.forEach(audio => {
        audio.removeEventListener('play', audio._playHandler); // 防止重复绑定
        audio._playHandler = () => pauseAllOtherAudios(audio);
        audio.addEventListener('play', audio._playHandler);
    });

    fileToolbar.style.display = selectedFilePaths.size > 0 ? 'flex' : 'none';
    updateSelectAllCheckbox();
}
    function updateSelectAllCheckbox() {
        if (!selectAllCheckbox) return;
        const total = document.querySelectorAll('.file-checkbox').length;
        const checked = document.querySelectorAll('.file-checkbox:checked').length;
        selectAllCheckbox.checked = total > 0 && checked === total;
        selectAllCheckbox.indeterminate = checked > 0 && checked < total;
    }

    if (selectAllCheckbox) {
        selectAllCheckbox.addEventListener('change', () => {
            const checked = selectAllCheckbox.checked;
            document.querySelectorAll('.file-checkbox').forEach(cb => {
                cb.checked = checked;
                const path = cb.getAttribute('data-path');
                if (checked) selectedFilePaths.add(path);
                else selectedFilePaths.delete(path);
            });
            fileToolbar.style.display = selectedFilePaths.size > 0 ? 'flex' : 'none';
        });
    }

    if (deleteSelectedBtn) deleteSelectedBtn.addEventListener('click', deleteSelectedFiles);
    if (batchDownloadBtn) batchDownloadBtn.addEventListener('click', batchDownloadSelected);

    function renderBreadcrumb() {
        breadcrumbDiv.innerHTML = '';
        const parts = currentPath.split('/').filter(p => p);
        const crumbs = [{ name: '根目录', path: '' }];
        let path = '';
        parts.forEach(part => {
            path += `${part}/`;
            crumbs.push({ name: part, path });
        });
        crumbs.forEach((crumb, idx) => {
            const span = document.createElement('span');
            span.className = 'breadcrumb-item';
            span.innerText = crumb.name;
            span.onclick = () => {
                currentPath = crumb.path;
                loadCurrentDirectory();
                selectedFile = null;
                updateDetailPanel(null);
            };
            breadcrumbDiv.appendChild(span);
            if (idx < crumbs.length - 1) {
                const sep = document.createElement('span');
                sep.className = 'breadcrumb-sep';
                sep.innerText = ' / ';
                breadcrumbDiv.appendChild(sep);
            }
        });
    }

    function updateDetailPanel(file, fullStoragePath) {
        if (!file) {
            detailContentDiv.innerHTML = '<div class="empty-state">点击文件查看详情</div>';
            return;
        }
        const publicUrl = supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(fullStoragePath).data.publicUrl;
        const encodedUrl = encodeURI(publicUrl);
        const ext = file.name.split('.').pop().toLowerCase();
        const isImage = ['jpg','jpeg','png','gif','webp','svg'].includes(ext);
        const isVideo = ['mp4','webm','mov'].includes(ext);
        const isAudio = ['mp3','wav','ogg','flac'].includes(ext);

        let previewHtml = '';
        if (isImage) {
            previewHtml = `<img src="${encodedUrl}" alt="preview" style="max-width:100%; max-height:200px; object-fit:contain;" onerror="this.onerror=null;this.src='';this.alt='加载失败';">`;
        } else if (isVideo) {
            previewHtml = `<video controls style="max-width:100%; max-height:200px;"><source src="${encodedUrl}" type="video/${ext}">无法播放</video>`;
        } else if (isAudio) {
            previewHtml = `<audio controls style="width:100%;"><source src="${encodedUrl}" type="audio/${ext}">无法播放</audio>`;
        } else {
            previewHtml = `<div style="font-size: 3rem; text-align:center;">📄</div>`;
        }

        detailContentDiv.innerHTML = `
            <div class="detail-preview">${previewHtml}</div>
            <div class="detail-info">
                <p><strong>文件名：</strong> ${file.name}</p>
                <p><strong>大小：</strong> ${file.metadata?.size ? formatBytes(file.metadata.size) : '-'}</p>
                <p><strong>上传时间：</strong> ${formatDate(file.created_at)}</p>
                <p><strong>MIME类型：</strong> ${file.metadata?.mimetype || '-'}</p>
                <p><strong>下载链接：</strong> <a href="${encodedUrl}" target="_blank">点击打开</a></p>
            </div>
        `;
    }

    async function createFolder() {
        const folderName = prompt('请输入文件夹名称（仅英文、数字、下划线）', '新文件夹');
        if (!folderName) return;
        const cleanName = folderName.replace(/[^a-zA-Z0-9_]/g, '_');
        if (!cleanName) {
            showToast('无效的文件夹名称', true);
            return;
        }
        const folderPath = currentPath ? `${currentPath}${cleanName}/` : `${cleanName}/`;
        try {
            const { error } = await supabaseClient.storage
                .from(BUCKET_NAME)
                .upload(folderPath, new Blob([]), { contentType: 'application/x-directory' });
            if (error) throw error;
            showToast(`✅ 文件夹 "${cleanName}" 创建成功`);
            loadCurrentDirectory();
        } catch (err) {
            showToast(`创建失败: ${err.message}`, true);
        }
    }

    // ==================== 右键菜单 ====================
    function showContextMenu(x, y) {
        contextMenu.style.display = 'block';
        contextMenu.style.left = `${x}px`;
        contextMenu.style.top = `${y}px`;
        // 根据目标类型显示不同菜单项
        const downloadFolderItem = contextMenu.querySelector('[data-action="downloadFolder"]');
        if (currentContextTarget.type === 'folder') {
            downloadFolderItem.style.display = 'block';
        } else {
            downloadFolderItem.style.display = 'none';
        }
    }

    function hideContextMenu() {
        contextMenu.style.display = 'none';
    }

    // 处理右键菜单点击
    document.querySelectorAll('.context-menu-item').forEach(item => {
        item.addEventListener('click', async () => {
            const action = item.dataset.action;
            if (!currentContextTarget) return;
            if (action === 'download') {
                if (currentContextTarget.type === 'file') {
                    const url = supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(currentContextTarget.path).data.publicUrl;
                    window.open(url, '_blank');
                } else if (currentContextTarget.type === 'folder') {
                    await downloadFolderAsZip(currentContextTarget.path);
                }
            } else if (action === 'delete') {
                if (currentContextTarget.type === 'file') {
                    if (confirm(`确定要删除 "${currentContextTarget.name}" 吗？`)) {
                        await deleteFile(currentContextTarget.path);
                    }
                } else if (currentContextTarget.type === 'folder') {
                    if (confirm(`确定要删除文件夹 "${currentContextTarget.name}" 及其所有内容吗？`)) {
                        try {
                            await deleteFolderRecursive(currentContextTarget.path);
                            showToast(`✅ 文件夹 "${currentContextTarget.name}" 已删除`);
                            loadCurrentDirectory();
                        } catch (err) {
                            showToast(`删除失败: ${err.message}`, true);
                        }
                    }
                }
            } else if (action === 'downloadFolder') {
                if (currentContextTarget.type === 'folder') {
                    await downloadFolderAsZip(currentContextTarget.path);
                }
            }
            hideContextMenu();
        });
    });

    document.addEventListener('click', () => hideContextMenu());

    // 传输面板折叠/展开
    const transferHeader = transferPanel.querySelector('.transfer-header');
    transferHeader.addEventListener('click', () => {
        transferPanel.classList.toggle('open');
        transferHeader.querySelector('span:last-child').innerText = transferPanel.classList.contains('open') ? '▲' : '▼';
    });
    transferPanel.classList.add('open');

    // 拖拽上传
    function setupDragAndDrop() {
        let dragCounter = 0;
        document.body.addEventListener('dragover', (e) => {
            e.preventDefault();
            dragCounter++;
            document.body.classList.add('drag-over');
        });
        document.body.addEventListener('dragleave', (e) => {
            dragCounter--;
            if (dragCounter === 0) document.body.classList.remove('drag-over');
        });
        document.body.addEventListener('drop', async (e) => {
            e.preventDefault();
            dragCounter = 0;
            document.body.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length) await uploadFiles(files);
        });
    }

    // 事件绑定
    uploadInput.addEventListener('change', (e) => uploadFiles(e.target.files));
    createFolderBtn.addEventListener('click', createFolder);
    createFolderBtnSidebar.addEventListener('click', createFolder);
    refreshBtn.addEventListener('click', () => loadCurrentDirectory());
    setupDragAndDrop();

    loadCurrentDirectory();
</script>
</body>
</html>
